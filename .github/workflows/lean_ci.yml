name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Install elan
        run: |
          for attempt in 1 2 3 4 5; do
            echo "elan install attempt ${attempt}/5"
            if curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep 30
          done
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Show tool versions
        run: |
          for attempt in 1 2 3 4 5; do
            echo "toolchain fetch attempt ${attempt}/5"
            if lean --version && lake --version; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep 30
          done
      - name: Build project
        run: |
          git config --global http.version HTTP/1.1
          for attempt in 1 2 3; do
            echo "lake build attempt ${attempt}/3"
            if lake build; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            rm -rf .lake/packages
            sleep 15
          done
